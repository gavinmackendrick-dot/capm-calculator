<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 24px;
    }

    h1 {
      font-size: 2.4rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #e94560;
    }

    #scoreboard {
      display: flex;
      gap: 40px;
      font-size: 1rem;
      background: #16213e;
      padding: 12px 32px;
      border-radius: 12px;
    }

    .score-block { text-align: center; }
    .score-block .label { font-size: 0.75rem; color: #888; letter-spacing: 2px; text-transform: uppercase; }
    .score-block .value { font-size: 2rem; font-weight: bold; margin-top: 2px; }
    .score-x .value { color: #e94560; }
    .score-draw .value { color: #aaa; }
    .score-o .value { color: #0f3460; background: #e0e0e0; border-radius: 6px; padding: 0 8px; }

    #status {
      font-size: 1.2rem;
      min-height: 1.6em;
      color: #ccc;
      letter-spacing: 1px;
    }

    #status .highlight { font-weight: bold; }
    #status .x { color: #e94560; }
    #status .o { color: #58b4d1; }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 10px;
    }

    .cell {
      background: #16213e;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: 900;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) { background: #0f3460; transform: scale(1.04); }
    .cell.taken { cursor: default; }
    .cell.x { color: #e94560; }
    .cell.o { color: #58b4d1; }
    .cell.winner { background: #0f3460; animation: pulse 0.5s ease; }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    #controls { display: flex; gap: 14px; }

    button {
      padding: 10px 28px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      font-weight: 600;
      letter-spacing: 1px;
      transition: opacity 0.15s, transform 0.1s;
    }
    button:hover { opacity: 0.85; transform: scale(1.03); }

    #btn-restart { background: #e94560; color: #fff; }
    #btn-reset   { background: #333; color: #ccc; }

    #mode-toggle {
      font-size: 0.85rem;
      color: #888;
      cursor: pointer;
      text-decoration: underline;
      background: none;
      border: none;
      padding: 0;
      letter-spacing: 1px;
    }
    #mode-toggle:hover { color: #ccc; transform: none; }
  </style>
</head>
<body>

<h1>Tic Tac Toe</h1>

<div id="scoreboard">
  <div class="score-block score-x">
    <div class="label">X</div>
    <div class="value" id="score-x">0</div>
  </div>
  <div class="score-block score-draw">
    <div class="label">Draw</div>
    <div class="value" id="score-draw">0</div>
  </div>
  <div class="score-block score-o">
    <div class="label">O</div>
    <div class="value" id="score-o">0</div>
  </div>
</div>

<div id="status"></div>

<div id="board">
  <div class="cell" data-i="0"></div>
  <div class="cell" data-i="1"></div>
  <div class="cell" data-i="2"></div>
  <div class="cell" data-i="3"></div>
  <div class="cell" data-i="4"></div>
  <div class="cell" data-i="5"></div>
  <div class="cell" data-i="6"></div>
  <div class="cell" data-i="7"></div>
  <div class="cell" data-i="8"></div>
</div>

<div id="controls">
  <button id="btn-restart">New Game</button>
  <button id="btn-reset">Reset Score</button>
</div>

<button id="mode-toggle"></button>

<script>
  const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

  let board, current, gameOver, scores, vsAI;

  const cells      = document.querySelectorAll('.cell');
  const statusEl   = document.getElementById('status');
  const scoreX     = document.getElementById('score-x');
  const scoreO     = document.getElementById('score-o');
  const scoreDraw  = document.getElementById('score-draw');
  const modeBtn    = document.getElementById('mode-toggle');

  function init() {
    vsAI = vsAI ?? false;
    scores = scores ?? { X: 0, O: 0, D: 0 };
    startGame();
  }

  function startGame() {
    board = Array(9).fill(null);
    current = 'X';
    gameOver = false;
    cells.forEach(c => { c.textContent = ''; c.className = 'cell'; });
    updateStatus();
    modeBtn.textContent = vsAI ? 'Switch to 2 Players' : 'Switch to vs Computer';
    if (vsAI && current === 'O') setTimeout(aiMove, 400);
  }

  function updateStatus(winner) {
    if (winner) {
      statusEl.innerHTML = `<span class="highlight ${winner.toLowerCase()}">${winner}</span> wins!`;
    } else if (gameOver) {
      statusEl.innerHTML = `<span class="highlight">Draw!</span>`;
    } else {
      const who = vsAI && current === 'O' ? 'Computer' : `Player <span class="highlight ${current.toLowerCase()}">${current}</span>`;
      statusEl.innerHTML = `${who}'s turn`;
    }
  }

  function checkWinner() {
    for (const [a, b, c] of WINS) {
      if (board[a] && board[a] === board[b] && board[a] === board[c]) {
        return { winner: board[a], line: [a, b, c] };
      }
    }
    return null;
  }

  function handleClick(i) {
    if (gameOver || board[i]) return;
    if (vsAI && current === 'O') return;
    place(i);
  }

  function place(i) {
    board[i] = current;
    const cell = cells[i];
    cell.textContent = current;
    cell.classList.add('taken', current.toLowerCase());

    const result = checkWinner();
    if (result) {
      result.line.forEach(j => cells[j].classList.add('winner'));
      gameOver = true;
      scores[result.winner]++;
      updateScores();
      updateStatus(result.winner);
      return;
    }
    if (board.every(Boolean)) {
      gameOver = true;
      scores.D++;
      updateScores();
      updateStatus();
      return;
    }

    current = current === 'X' ? 'O' : 'X';
    updateStatus();

    if (vsAI && current === 'O' && !gameOver) {
      setTimeout(aiMove, 380);
    }
  }

  function updateScores() {
    scoreX.textContent = scores.X;
    scoreO.textContent = scores.O;
    scoreDraw.textContent = scores.D;
  }

  // Minimax AI
  function aiMove() {
    const idx = bestMove();
    place(idx);
  }

  function bestMove() {
    let best = -Infinity, move = -1;
    for (let i = 0; i < 9; i++) {
      if (!board[i]) {
        board[i] = 'O';
        const score = minimax(board, 0, false);
        board[i] = null;
        if (score > best) { best = score; move = i; }
      }
    }
    return move;
  }

  function minimax(b, depth, isMax) {
    const result = checkWinner();
    if (result) return result.winner === 'O' ? 10 - depth : depth - 10;
    if (b.every(Boolean)) return 0;

    if (isMax) {
      let best = -Infinity;
      for (let i = 0; i < 9; i++) {
        if (!b[i]) { b[i] = 'O'; best = Math.max(best, minimax(b, depth+1, false)); b[i] = null; }
      }
      return best;
    } else {
      let best = Infinity;
      for (let i = 0; i < 9; i++) {
        if (!b[i]) { b[i] = 'X'; best = Math.min(best, minimax(b, depth+1, true)); b[i] = null; }
      }
      return best;
    }
  }

  cells.forEach(c => c.addEventListener('click', () => handleClick(+c.dataset.i)));
  document.getElementById('btn-restart').addEventListener('click', startGame);
  document.getElementById('btn-reset').addEventListener('click', () => {
    scores = { X: 0, O: 0, D: 0 };
    updateScores();
    startGame();
  });
  modeBtn.addEventListener('click', () => {
    vsAI = !vsAI;
    scores = { X: 0, O: 0, D: 0 };
    updateScores();
    startGame();
  });

  init();
</script>
</body>
</html>
